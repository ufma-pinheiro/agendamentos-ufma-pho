<!-- login.html -->
<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://esm.sh https://vercel.live; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com; connect-src 'self' wss://ibukwhlxefiyqalrooam.supabase.co https://ibukwhlxefiyqalrooam.supabase.co https://cdn.jsdelivr.net https://esm.sh; img-src 'self' data: https://vercel.live">
    <title>Login | Agenda UFMA</title>
    <meta name="description" content="Sistema de agendamentos UFMA - Acesso restrito">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">

    <div class="login-background">
        <div class="gradient-overlay"></div>
        <div class="pattern-overlay"></div>
    </div>

    <div class="login-container">
        <div class="login-brand">
            <div class="logo-animation">
                <div class="logo-circle">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <div class="logo-pulse"></div>
            </div>
            <h1>Agenda UFMA</h1>
            <p>Sistema de Gestão de Espaços Acadêmicos</p>
        </div>

        <div class="login-card glass">
            <div class="login-content">
                <div id="loginGoogle" class="login-form active">
                    <div class="google-prompt">
                        <div class="google-icon-large">
                            <svg viewBox="0 0 24 24">
                                <path fill="#4285F4"
                                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                                <path fill="#34A853"
                                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                                <path fill="#FBBC05"
                                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                                <path fill="#EA4335"
                                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                            </svg>
                        </div>
                        <h3>Acesso ao Sistema</h3>
                        <p>Utilize sua conta Google institucional para acessar. Apenas e-mails autorizados pelo
                            administrador têm permissão de acesso.</p>
                        <button class="btn-google-login" id="btnGoogleLogin">
                            <i class="fab fa-google"></i>
                            Entrar com Google
                        </button>
                        <p class="login-notice"
                            style="margin-top: 1rem; font-size: 0.8rem; color: var(--text-tertiary);">
                            <i class="fas fa-lock" style="margin-right: 0.3rem;"></i>
                            Acesso restrito a usuários cadastrados
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <div class="login-footer">
            <p>© 2026 Universidade Federal do Maranhão</p>
            <div class="security-badge">
                <i class="fas fa-shield-alt"></i>
                <span>Conexão Segura</span>
            </div>
        </div>
    </div>

    <script type="module" src="login.js"></script>
</body>

</html>
